<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTeens AI Artifact Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        #video-container { position: relative; width: 90%; max-width: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        img#video-stream { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        button { padding: 16px 35px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; width: 80%; transition: 0.3s; text-transform: uppercase;}
        #connectBtn { background: var(--neon); color: #000; }
        #talkBtn { background: #0088ff; color: #fff; display: none; }
        #status { font-family: 'Courier New', monospace; color: var(--neon); font-size: 14px; margin: 10px; min-height: 1.2em; text-transform: uppercase; }
        .ai-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 85%; border: 1px solid rgba(255,255,255,0.1); min-height: 60px; font-size: 17px;}
    </style>
</head>
<body>

    <div id="video-container">
        <img id="video-stream" src="" crossorigin="anonymous">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Инициализация систем...</div>
        <div id="ai-response" class="ai-box">Ожидаю подключения LEGO Хаба...</div>
        <button id="connectBtn">1. ПОДКЛЮЧИТЬ РОБОТА</button>
        <button id="talkBtn">🎤 ЗАДАТЬ ВОПРОС ОБ ЭКСПОНАТЕ</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4"; 
        const IP_CAM_URL = "http://192.168.100.6:8081/video"; // IP твоего сервера камеры

        // Какую категорию объектов будем искать на соревновании для демонстрации подьема?
        // Популярные в COCO-SSD: "bottle" (бутылка), "cup" (чашка), "book" (книга), "backpack" (рюкзак)
        const TARGET_LABEL = "bottle"; 

        const img = document.getElementById('video-stream');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');

        let model, hubChar, recognition;
        
        // Переменные состояния
        let isSpeaking = false;
        let isBTBusy = false;
        let lastBTTime = 0;
        let currentArtifact = ""; // Сюда запишем то, что робот поднял

        // Автономный цикл (State Machine)
        // Статусы: 'SEARCH', 'APPROACH', 'LIFT', 'INSPECT', 'RESPOND', 'LOWER'
        let robotState = 'SEARCH'; 

        // --- 1. BLUETOOTH СВЯЗЬ (Lego LWP) ---
        connectBtn.onclick = async () => {
            try {
                status.innerText = "Поиск TechTeens Хаба...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LEGO' }],
                    optionalServices: ['00001623-1212-efde-1523-785feabcd123']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001623-1212-efde-1523-785feabcd123');
                hubChar = await service.getCharacteristic('00001623-1212-efde-1523-785feabcd123');
                
                status.innerText = "РОБОТ ПОДКЛЮЧЕН";
                aiBox.innerText = "Ищу экспонаты типа '" + TARGET_LABEL + "'...";
                connectBtn.style.display = "none";
                talkBtn.style.display = "block";
            } catch (e) { status.innerText = "BT Error: " + e.message; }
        };

        // Функция отправки команд на базу (Порт A и B)
        async function sendLegoMove(left, right) {
            const now = Date.now();
            if (!hubChar || isBTBusy || now - lastBTTime < 130) return;
            isBTBusy = true; lastBTTime = now;
            
            // Пакеты: [длина, 0x00, 0x81, порт, 0x11, 0x51, 0x01, скорость]
            const cmdA = new Uint8Array([0x08, 0x00, 0x81, 0x00, 0x11, 0x51, 0x01, left & 0xff]);
            const cmdB = new Uint8Array([0x08, 0x00, 0x81, 0x01, 0x11, 0x51, 0x01, (-right) & 0xff]);
            
            try {
                await hubChar.writeValueWithoutResponse(cmdA);
                await new Promise(r => setTimeout(r, 45)); // Обязательная пауза
                await hubChar.writeValueWithoutResponse(cmdB);
            } catch (e) {} finally { isBTBusy = false; }
        }

        // --- НОВОЕ: Функция управления 3-м мотором (Порт C) ---
        // command=0x11 (Power Direct), mode=0x51 (Power)
        // Данные: -100 to 100
        async function sendLiftAction(power, durationMs) {
            if (!hubChar) return;
            // Убедимся, что колеса не крутятся
            sendLegoMove(0,0);
            await new Promise(r => setTimeout(r, 100));

            status.innerText = power > 0 ? "Подъем экспоната..." : "Спуск экспоната...";
            const cmdC = new Uint8Array([0x08, 0x00, 0x81, 0x02, 0x11, 0x51, 0x01, power & 0xff]);
            
            try {
                await hubChar.writeValueWithoutResponse(cmdC);
                await new Promise(r => setTimeout(r, durationMs));
                await hubChar.writeValueWithoutResponse(new Uint8Array([0x08, 0x00, 0x81, 0x02, 0x11, 0x51, 0x01, 0x00])); // Стоп
            } catch (e) {}
        }

        // --- 2. ЗРЕНИЕ И СЛЕЖЕНИЕ ЧЕРЕЗ IP-ПОТОК (Смена модели) ---
        async function setup() {
            try {
                status.innerText = "Загрузка Нейросети (COCO-SSD)...";
                aiBox.innerText = "ИИ учится распознавать объекты";
                
                // Загружаем тяжелую модель (чашка, бутылка, телефон и т.д.)
                model = await cocoSsd.load({base: 'lite_mobilenet_v2'}); // 'lite' версия быстрее на Samsung
                
                // Настраиваем IP стрим
                img.crossOrigin = "anonymous";
                img.src = IP_CAM_URL;
                
                img.onload = () => {
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    status.innerText = "Системы Активны";
                    // Если хаб еще не подключен, просто детектим в фоне
                    detect(); 
                };

                img.onerror = () => {
                    status.innerText = "Ошибка сервера камеры " + IP_CAM_URL;
                    aiBox.innerText = "Запустите трансляцию в приложении на Samsung A53!";
                };

            } catch (e) { status.innerText = "Критическая ошибка ИИ"; console.error(e);}
        }

        // --- ГЛАВНЫЙ АВТОНОМНЫЙ ЦИКЛ (Зрение + Движение + Подьем) ---
        async function detect() {
            // Если робот говорит — пауза в звании
            if (isSpeaking) { requestAnimationFrame(detect); return; }

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Детекция объектов на кадре
            // Высокий порог (0.5), чтобы не было ложных срабатываний
            const predictions = await model.detect(img, {scoreThreshold: 0.5});
            
            // Фильтруем: ищем только нашу цель
            const target = predictions.find(p => p.class === TARGET_LABEL);
            const center = canvas.width / 2;

            if (target) {
                // Отрисовка рамки цели
                const [x, y, width, height] = target.bbox;
                ctx.strokeStyle = "#ff0088"; ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);
                ctx.fillStyle = "#ff0088"; ctx.fillText(`${target.class} (${Math.round(target.score*100)}%)`, x, y > 10 ? y - 10 : 10);

                // --- ЛОГИКА АВТОНОМНОГО СКАНЕРА ---
                if (!hubChar) {
                    status.innerText = "ИИ видит '" + TARGET_LABEL + "'. Подключите Хаб!";
                } else if (robotState === 'SEARCH') {
                    // Переходим к сближению
                    robotState = 'APPROACH';
                    status.innerText = "Цель обнаружена. Сближение...";
                } else if (robotState === 'APPROACH') {
                    // Вычисляем центр объекта
                    const objX = x + width/2;
                    const area = width * height; // Площадь — мерило дистанции
                    const maxArea = canvas.width * canvas.height;

                    // Порог остановки: объект должен занимать > 20% площади кадра
                    if (area > maxArea * 0.20) {
                        // Остановка
                        sendLegoMove(0, 0);
                        // Запускаем подьем
                        robotState = 'LIFT';
                    } else {
                        // Движение и центрирование
                        const turnDeadzone = canvas.width * 0.08; // Зона нечувствительности 8% от ширины
                        if (objX < center - turnDeadzone) sendLegoMove(20, -20); // Поворот влево
                        else if (objX > center + turnDeadzone) sendLegoMove(-20, 20); // Поворот вправо
                        else sendLegoMove(25, 25); // Прямо
                    }
                }
            } else if (hubChar) {
                // Если цели нет
                if (robotState === 'SEARCH') {
                    // Сканирование (вращение)
                    sendLegoMove(20, -20);
                    status.innerText = "СКАНИРОВАНИЕ КОМНАТЫ...";
                } else if (robotState === 'APPROACH') {
                    // Цель потеряна во время движения — остановка и сброс к поиску
                    sendLegoMove(0, 0);
                    robotState = 'SEARCH';
                    status.innerText = "Цель потеряна. Сброс к поиску.";
                }
            }

            // --- БЛОК ОРАБОТКИ СОСТОЯНИЙ ПОДЪЕМА И ОСМОТРА ---
            // Эти блоки вызываются не внутри IF(TARGET), чтобы работать без детекции
            if (hubChar && robotState === 'LIFT') {
                sendLegoMove(0, 0); // Стоп база
                // Включаем мотор С вверх, сила 70%, длительность 2 секунды (настрой под свой лифт)
                await sendLiftAction(70, 2000); 
                robotState = 'INSPECT';
            } else if (hubChar && robotState === 'INSPECT') {
                status.innerText = "Проведение анализа...";
                // Пауза, чтобы камера стабилизировалась
                await new Promise(r => setTimeout(r, 500));
                
                // Делаем одну высокую точность детекции на поднятом объекте
                const inspectPreds = await model.detect(img, {scoreThreshold: 0.65});
                const artifact = inspectPreds[0] ? inspectPreds[0].class : TARGET_LABEL; // Берем лучшее
                currentArtifact = artifact; // Записываем
                
                status.innerText = "Экспонат опознан!";
                aiBox.innerText = `Это ${artifact}. Генерирую исторический факт...`;
                
                // Переходим к ответу (Голос + Gemini)
                robotState = 'RESPOND';
                handleAutonomousResponse(artifact);
            } else if (hubChar && robotState === 'LOWER') {
                // Включаем мотор С вниз, сила -50%, длительность 2.2 секунды
                await sendLiftAction(-50, 2200); 
                robotState = 'SEARCH';
                currentArtifact = "";
                aiBox.innerText = "Спуск завершен. Ищу новые экспонаты...";
            }

            requestAnimationFrame(detect);
        }

        // --- 3. ГОЛОС И GEMINI (Интеграция Artifact Tracker) ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                aiBox.innerText = "Вы: " + text;
                // Спрашиваем Gemini про ПОДНЯТЫЙ артефакт
                processWithGemini(text, currentArtifact || "неопознанный объект");
            };
            recognition.onend = () => { if(!isSpeaking && currentArtifact==="") status.innerText = "Готов слушать"; };
        }

        talkBtn.onclick = () => { 
            if(!isSpeaking && recognition) { 
                try { recognition.start(); status.innerText = "Слушаю вопрос..."; } catch(e) {} 
            } 
        };

        // Функция Gemini для АВТОНОМНОГО режима (когда робот поднял предмет)
        async function handleAutonomousResponse(artifactName) {
            if(!GEMINI_API_KEY) { speakAutonomous(`Это ${artifactName}.`); return;}
            
            try {
                // Новый промпт: Короткая, интересная историческая справка
                const prompt = `Ты - робот-гид в Казахстане. Твой сканер определил этот объект как '${artifactName}'. Твоя задача: Составить КРАТКОЕ (макс 18 слов), интересное и немного смешное историческое описание этого 'артефакта' в контексте кочевников. Например, если это бутылка, скажи, что это древний термос для кумыса.`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = `ИИ: ${reply}`;
                
                // Сказать ответ и по завершении спустить лифт
                speakAutonomous(`Результат сканирования: ${reply}`);
            } catch (e) { speakAutonomous(`Ошибка сканера. Но это точно '${artifactName}'`); }
        }

        // Функция Gemini для ВОПРОСОВ пользователя (когда юзер жмет микрофон)
        async function processWithGemini(userText, currentArt) {
            status.innerText = "Gemini думает...";
            try {
                // Если робот уже поднял предмет, Gemini должна знать об этом контексте
                let context = currentArt !== "неопознанный объект" 
                    ? `Мы сейчас смотрим на экспонат, который мы опознали как '${currentArt}'. ` 
                    : "Мы еще ничего не подняли. ";
                
                const prompt = `Ты - робот-гид от TechTeens в Казахстане. ${context}Кратко (15 слов) ответь на вопрос: ${userText}`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = `TechTeens: ${reply}`;
                speakConversation(reply);
            } catch (e) { aiBox.innerText = "Ошибка Gemini"; }
        }

        // Общая функция речи
        function speakCommon(text, lang='ru-RU') {
            isSpeaking = true;
            if (recognition) recognition.stop();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang;
            return msg;
        }

        // Речь для разговорного режима (микрофон)
        function speakConversation(text) {
            const msg = speakCommon(text);
            msg.onend = () => { isSpeaking = false; status.innerText = "Стрим активен"; };
            window.speechSynthesis.speak(msg);
        }

        // Речь для автономного режима (после нее лифт едет вниз)
        function speakAutonomous(text) {
            const msg = speakCommon(text);
            msg.onend = () => { 
                isSpeaking = false; 
                if(hubChar) robotState = 'LOWER'; // Спускаем лифт
            };
            window.speechSynthesis.speak(msg);
        }

        setup();
    </script>
</body>
</html>
