<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTeens AI Robot - IP Cam Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }
        #video-container { position: relative; width: 90%; max-width: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        /* При использовании IP-камеры часто не нужно зеркалить (transform: scaleX(-1)), 
           но если будет инверсия — просто удали строку ниже */
        img#video-stream { width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        button { padding: 16px 35px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; width: 80%; transition: 0.3s; }
        #connectBtn { background: var(--neon); color: #000; }
        #talkBtn { background: #0088ff; color: #fff; display: none; }
        #status { font-family: monospace; color: var(--neon); font-size: 14px; margin: 10px; min-height: 1.2em; }
        .ai-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; width: 85%; border: 1px solid rgba(255,255,255,0.1); min-height: 60px; }
    </style>
</head>
<body>

    <div id="video-container">
        <img id="video-stream" src="" crossorigin="anonymous">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Ожидание настройки...</div>
        <div id="ai-response" class="ai-box">Подключите LEGO и запустите сервер камеры</div>
        <button id="connectBtn">1. ПОДКЛЮЧИТЬ LEGO HUB</button>
        <button id="talkBtn">🎤 ЗАДАТЬ ВОПРОС</button>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4"; 
        const IP_CAM_URL = "http://192.168.100.6:8081/video"; // Твой адрес

        const img = document.getElementById('video-stream');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');

        let model, hubChar, recognition;
        let isSpeaking = false;
        let isBTBusy = false;
        let lastBTTime = 0;

        // --- 1. BLUETOOTH (LEGO SPIKE) ---
        connectBtn.onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LEGO' }],
                    optionalServices: ['00001623-1212-efde-1523-785feabcd123']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001623-1212-efde-1523-785feabcd123');
                hubChar = await service.getCharacteristic('00001623-1212-efde-1523-785feabcd123');
                status.innerText = "LEGO ПОДКЛЮЧЕН";
                connectBtn.style.display = "none";
                talkBtn.style.display = "block";
            } catch (e) { status.innerText = "Ошибка BT: " + e.message; }
        };

        async function sendLegoMove(left, right) {
            const now = Date.now();
            if (!hubChar || isBTBusy || now - lastBTTime < 130) return;
            isBTBusy = true; lastBTTime = now;
            
            const cmdA = new Uint8Array([0x08, 0x00, 0x81, 0x00, 0x11, 0x51, 0x01, left & 0xff]);
            const cmdB = new Uint8Array([0x08, 0x00, 0x81, 0x01, 0x11, 0x51, 0x01, (-right) & 0xff]);
            
            try {
                await hubChar.writeValueWithoutResponse(cmdA);
                await new Promise(r => setTimeout(r, 45));
                await hubChar.writeValueWithoutResponse(cmdB);
            } catch (e) {} finally { isBTBusy = false; }
        }

        // --- 2. ИИ И РЕЧЬ ---
        async function processWithAI(text) {
            status.innerText = "Gemini думает...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Ты робот-гид TechTeens. Кратко: ${text}` }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = reply;
                
                isSpeaking = true;
                const msg = new SpeechSynthesisUtterance(reply);
                msg.lang = 'ru-RU';
                msg.onend = () => { isSpeaking = false; status.innerText = "Стрим активен"; };
                window.speechSynthesis.speak(msg);
            } catch (e) { status.innerText = "Ошибка ИИ"; }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                aiBox.innerText = "Вы: " + text;
                processWithAI(text);
            };
        }
        talkBtn.onclick = () => { recognition.start(); status.innerText = "Слушаю..."; };

        // --- 3. ЗРЕНИЕ ЧЕРЕЗ IP-ПОТОК ---
        async function setup() {
            try {
                status.innerText = "Загрузка нейросети...";
                model = await blazeface.load();
                
                // Подключаемся к стриму приложения
                img.src = IP_CAM_URL;
                
                img.onload = () => {
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    status.innerText = "Стрим активен";
                    detect();
                };

                img.onerror = () => {
                    status.innerText = "Ошибка стрима! Проверь IP 192.168.100.6";
                };

            } catch (e) { status.innerText = "Критическая ошибка"; }
        }

        async function detect() {
            if (isSpeaking) { requestAnimationFrame(detect); return; }

            // Используем изображение из <img> для детекции лиц
            const preds = await model.estimateFaces(img, false);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (preds.length > 0) {
                const face = preds[0];
                const x = face.topLeft[0] + (face.bottomRight[0] - face.topLeft[0]) / 2;
                const center = canvas.width / 2;

                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 4;
                ctx.strokeRect(face.topLeft[0], face.topLeft[1], face.bottomRight[0]-face.topLeft[0], face.bottomRight[1]-face.topLeft[1]);

                // Логика движения
                if (x < center - 70) sendLegoMove(30, -30);
                else if (x > center + 70) sendLegoMove(-30, 30);
                else sendLegoMove(0, 0);
            } else {
                sendLegoMove(0, 0);
            }
            requestAnimationFrame(detect);
        }

        setup();
    </script>
</body>
</html>
