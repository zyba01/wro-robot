<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTeens AI Guide - Samsung Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: #fff; margin: 0; }
        #video-container { position: relative; width: 90%; max-width: 500px; margin: 15px auto; border-radius: 20px; overflow: hidden; border: 3px solid var(--neon); }
        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .controls { padding: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 15px 30px; font-size: 16px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; width: 80%; }
        #connectBtn { background: var(--neon); color: #000; }
        #switchCamBtn { background: #444; color: #fff; }
        #talkBtn { background: #0088ff; color: #fff; display: none; }
        #status { font-family: monospace; color: var(--neon); font-size: 13px; margin: 5px; }
        .ai-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; width: 85%; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Инициализация...</div>
        <div id="ai-response" class="ai-box">Подключите LEGO и камеру</div>
        <button id="connectBtn">1. ПОДКЛЮЧИТЬ LEGO</button>
        <button id="switchCamBtn">2. СМЕНИТЬ КАМЕРУ (КЛИКАЙ)</button>
        <button id="talkBtn">🎤 ЗАДАТЬ ВОПРОС</button>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');
        const switchBtn = document.getElementById('switchCamBtn');

        let model, hubChar, recognition;
        let isSpeaking = false;
        let isBTBusy = false;
        let lastBTTime = 0;
        let videoDevices = [];
        let currentDeviceIdx = 0;

        // --- BLUETOOTH ---
        connectBtn.onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LEGO' }],
                    optionalServices: ['00001623-1212-efde-1523-785feabcd123']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001623-1212-efde-1523-785feabcd123');
                hubChar = await service.getCharacteristic('00001623-1212-efde-1523-785feabcd123');
                status.innerText = "LEGO OK";
                connectBtn.style.display = "none";
                talkBtn.style.display = "block";
            } catch (e) { status.innerText = "BT Error"; }
        };

        async function sendLegoMove(left, right) {
            const now = Date.now();
            if (!hubChar || isBTBusy || now - lastBTTime < 130) return;
            isBTBusy = true; lastBTTime = now;
            const cmdA = new Uint8Array([0x08, 0x00, 0x81, 0x00, 0x11, 0x51, 0x01, left & 0xff]);
            const cmdB = new Uint8Array([0x08, 0x00, 0x81, 0x01, 0x11, 0x51, 0x01, (-right) & 0xff]);
            try {
                await hubChar.writeValueWithoutResponse(cmdA);
                await new Promise(r => setTimeout(r, 50));
                await hubChar.writeValueWithoutResponse(cmdB);
            } catch (e) {} finally { isBTBusy = false; }
        }

        // --- УПРАВЛЕНИЕ КАМЕРОЙ ---
        async function setup() {
            try {
                model = await blazeface.load();
                
                // Запрос прав
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                status.innerText = `Найдено камер: ${videoDevices.length}. Жми кнопку "Сменить"`;
                
                // Пробуем запустить первую
                await startCamera(0);
            } catch (e) { status.innerText = "Ошибка камер"; }
        }

        async function startCamera(idx) {
            if (window.currentStream) window.currentStream.getTracks().forEach(t => t.stop());

            const constraints = {
                video: { 
                    deviceId: videoDevices[idx] ? { exact: videoDevices[idx].deviceId } : undefined,
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.currentStream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detect();
                };
                status.innerText = `Активна: ${videoDevices[idx].label || 'Камера ' + idx}`;
            } catch (e) {
                status.innerText = "Ошибка переключения";
            }
        }

        switchBtn.onclick = () => {
            currentDeviceIdx = (currentDeviceIdx + 1) % videoDevices.length;
            startCamera(currentDeviceIdx);
        };

        // --- ИИ И ЗРЕНИЕ (Стабильная версия) ---
        async function processWithAI(text) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Ты робот TechTeens. Кратко: ${text}` }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = reply;
                isSpeaking = true;
                const msg = new SpeechSynthesisUtterance(reply);
                msg.onend = () => isSpeaking = false;
                window.speechSynthesis.speak(msg);
            } catch (e) {}
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (e) => processWithAI(e.results[0][0].transcript);
        }
        talkBtn.onclick = () => recognition.start();

        async function detect() {
            if (isSpeaking) { requestAnimationFrame(detect); return; }
            const preds = await model.estimateFaces(video, false);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (preds.length > 0) {
                const face = preds[0];
                const x = face.topLeft[0] + (face.bottomRight[0] - face.topLeft[0]) / 2;
                const center = canvas.width / 2;
                ctx.strokeStyle = "#00ff88"; 
                ctx.strokeRect(face.topLeft[0], face.topLeft[1], face.bottomRight[0]-face.topLeft[0], face.bottomRight[1]-face.topLeft[1]);

                if (x < center - 60) sendLegoMove(30, -30);
                else if (x > center + 60) sendLegoMove(-30, 30);
                else sendLegoMove(0, 0);
            } else { sendLegoMove(0, 0); }
            requestAnimationFrame(detect);
        }

        setup();
    </script>
</body>
</html>
