<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTeens AI Guide - Final Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        #video-container { position: relative; width: 95%; max-width: 500px; margin: 15px auto; border-radius: 25px; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 18px 45px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        #connectBtn { background: var(--neon); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }
        #talkBtn { background: #0088ff; color: #fff; display: none; box-shadow: 0 4px 15px rgba(0,136,255,0.4); }
        #status { font-family: 'Courier New', monospace; color: var(--neon); margin: 5px; font-size: 14px; text-transform: uppercase; }
        .ai-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); min-height: 70px; font-size: 17px; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Инициализация систем...</div>
        <div id="ai-response" class="ai-box">Подключите LEGO и начните диалог</div>
        <button id="connectBtn">Подключить Хаб</button>
        <button id="talkBtn">🎤 Спросить робота</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');

        let model, hubChar, recognition;
        let isTracking = true;
        let isSpeaking = false;
        let isBTBusy = false;
        let lastBTTime = 0;

        // --- 1. BLUETOOTH СВЯЗЬ (LEGO LWP) ---
        connectBtn.onclick = async () => {
            try {
                status.innerText = "Поиск LEGO...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LEGO' }],
                    optionalServices: ['00001623-1212-efde-1523-785feabcd123']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001623-1212-efde-1523-785feabcd123');
                hubChar = await service.getCharacteristic('00001623-1212-efde-1523-785feabcd123');
                
                status.innerText = "РОБОТ ПОДКЛЮЧЕН";
                connectBtn.style.display = "none";
                talkBtn.style.display = "block";
            } catch (e) { 
                status.innerText = "Ошибка Bluetooth";
                console.error(e);
            }
        };

        async function sendLegoMove(left, right) {
            const now = Date.now();
            if (!hubChar || isBTBusy || now - lastBTTime < 130) return;
            
            isBTBusy = true;
            lastBTTime = now;

            // Формируем отдельные пакеты для Порта A (0x00) и B (0x01)
            const cmdA = new Uint8Array([0x08, 0x00, 0x81, 0x00, 0x11, 0x51, 0x01, left & 0xff]);
            const cmdB = new Uint8Array([0x08, 0x00, 0x81, 0x01, 0x11, 0x51, 0x01, (-right) & 0xff]);
            
            try {
                await hubChar.writeValueWithoutResponse(cmdA);
                await new Promise(r => setTimeout(r, 50)); // Пауза, чтобы Хаб не "захлебнулся"
                await hubChar.writeValueWithoutResponse(cmdB);
            } catch (e) { } finally { isBTBusy = false; }
        }

        // --- 2. РАСПОЗНАВАНИЕ РЕЧИ И ИИ ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                aiBox.innerText = "Вы: " + text;
                processWithAI(text);
            };
            recognition.onend = () => { if(!isSpeaking) status.innerText = "Готов слушать"; };
        }

        talkBtn.onclick = () => { 
            if(!isSpeaking) { 
                try { recognition.start(); status.innerText = "Слушаю..."; } catch(e) {} 
            } 
        };

        async function processWithAI(text) {
            status.innerText = "Gemini думает...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Ты - робот-гид в Актау от TechTeens. Отвечай кратко (10-15 слов). Вопрос: ${text}` }] }]
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = reply;
                speak(reply);
            } catch (e) { aiBox.innerText = "Ошибка ИИ"; }
        }

        function speak(text) {
            isSpeaking = true;
            if (recognition) recognition.stop();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            msg.onend = () => { isSpeaking = false; status.innerText = "Готов!"; };
            window.speechSynthesis.speak(msg);
        }

        // --- 3. ЗРЕНИЕ (ФИКС ВНЕШНЕЙ КАМЕРЫ) ---
        async function setup() {
            try {
                status.innerText = "Загрузка модели...";
                model = await blazeface.load();
                
                // Сначала запрашиваем любой доступ, чтобы открыть список ID устройств
                const streamInit = await navigator.mediaDevices.getUserMedia({ video: true });
                streamInit.getTracks().forEach(track => track.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                let constraints;
                if (videoDevices.length > 1) {
                    // Пробуем взять последнюю камеру в списке (обычно это USB)
                    const webCamId = videoDevices[videoDevices.length - 1].deviceId;
                    constraints = { 
                        video: { deviceId: { exact: webCamId }, frameRate: { ideal: 30 } } 
                    };
                    status.innerText = "Внешняя камера OK";
                } else {
                    constraints = { 
                        video: { facingMode: "user" }, frameRate: { ideal: 30 } 
                    };
                    status.innerText = "Встроеная камера OK";
                }

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detect();
                };
            } catch (e) { status.innerText = "Ошибка камеры!"; }
        }

        async function detect() {
            // Если робот говорит или трекинг выключен - не двигаемся
            if (!isTracking || isSpeaking) {
                requestAnimationFrame(detect);
                return;
            }

            const preds = await model.estimateFaces(video, false);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (preds.length > 0) {
                const face = preds[0];
                const x = face.topLeft[0] + (face.bottomRight[0] - face.topLeft[0]) / 2;
                const center = canvas.width / 2;

                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 4;
                ctx.strokeRect(face.topLeft[0], face.topLeft[1], face.bottomRight[0]-face.topLeft[0], face.bottomRight[1]-face.topLeft[1]);

                const speed = 30; 
                const deadzone = 65; 

                if (x < center - deadzone) sendLegoMove(speed, -speed);
                else if (x > center + deadzone) sendLegoMove(-speed, speed);
                else sendLegoMove(0, 0);
            } else {
                sendLegoMove(0, 0);
            }

            requestAnimationFrame(detect);
        }

        setup();
    </script>
</body>
</html>
