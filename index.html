<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTeens AI Guide - Final Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        :root { --neon: #00ff88; --bg: #0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        #video-container { position: relative; width: 95%; max-width: 500px; margin: 15px auto; border-radius: 25px; overflow: hidden; border: 3px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 18px 45px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; text-transform: uppercase; }
        #connectBtn { background: var(--neon); color: #000; box-shadow: 0 4px 15px rgba(0,255,136,0.4); }
        #talkBtn { background: #0088ff; color: #fff; display: none; box-shadow: 0 4px 15px rgba(0,136,255,0.4); }
        #status { font-family: 'Courier New', monospace; color: var(--neon); margin: 5px; font-size: 14px; text-transform: uppercase; }
        .ai-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); min-height: 70px; font-size: 17px; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Инициализация систем...</div>
        <div id="ai-response" class="ai-box">Подключите LEGO и начните диалог</div>
        <button id="connectBtn">Подключить Хаб</button>
        <button id="talkBtn">🎤 Спросить робота</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4"; 

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');

        let model, hubChar, recognition;
        let isTracking = true;
        let isSpeaking = false;
        let isBTBusy = false;
        let lastBTTime = 0;
        
        let videoDevices = [];
        let currentDeviceIdx = 0;

        async function setup() {
            try {
                status.innerText = "Загрузка ИИ...";
                model = await blazeface.load();
                
                // 1. Просим доступ, чтобы открылись названия камер
                const initStream = await navigator.mediaDevices.getUserMedia({ video: true });
                initStream.getTracks().forEach(t => t.stop());

                // 2. Получаем список всех камер
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(d => d.kind === 'videoinput');

                if (videoDevices.length > 0) {
                    // Ищем камеру, которая похожа на внешнюю по названию
                    let usbCamIdx = videoDevices.findIndex(d => 
                        d.label.toLowerCase().includes('usb') || 
                        d.label.toLowerCase().includes('external') ||
                        d.label.toLowerCase().includes('uvc')
                    );

                    // Если нашли по имени — берем её, если нет — пробуем индекс 1 (обычно это внешняя)
                    currentDeviceIdx = usbCamIdx !== -1 ? usbCamIdx : (videoDevices.length > 1 ? 1 : 0);
                    
                    await startStream(currentDeviceIdx);
                }
            } catch (e) {
                status.innerText = "Ошибка камеры: " + e.message;
            }
        }

        async function startStream(idx) {
            if (window.currentStream) {
                window.currentStream.getTracks().forEach(t => t.stop());
            }

            const constraints = {
                video: { 
                    deviceId: { exact: videoDevices[idx].deviceId },
                    frameRate: { ideal: 30 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.currentStream = stream;
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detect();
                };
                status.innerText = "Камера: " + (videoDevices[idx].label || "Внешняя");
            } catch (e) {
                // Если "силовой" выбор по ID не сработал, откатываемся на обычный режим
                const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = fallback;
                detect();
            }
        }
        setup();
    </script>
</body>
</html>
