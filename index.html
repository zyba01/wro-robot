<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktau AI Guide Bot - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        :root { --accent: #00ffcc; --bg: #0d0d0d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #header { margin: 20px; text-align: center; }
        h1 { color: var(--accent); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        
        #container { position: relative; width: 500px; height: 375px; border-radius: 20px; overflow: hidden; border: 3px solid #333; box-shadow: 0 0 30px rgba(0,255,204,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

        .controls { width: 500px; margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .status-box { background: #1a1a1a; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 13px; color: var(--accent); border: 1px solid #333; }
        
        .chat-bubble { background: #222; padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); min-height: 40px; font-style: italic; }

        button { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        #btnConnect { background: var(--accent); color: #000; }
        #btnTalk { background: #0077ff; color: #fff; display: none; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="header">
        <h1>AI Guide Aktau</h1>
        <div id="status">Инициализация систем...</div>
    </div>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="controls">
        <div class="status-box" id="sysLog">СИСТЕМА: ОЖИДАНИЕ...</div>
        <div class="chat-bubble" id="aiReply">Привет! Подключи LEGO Hub, и я смогу следить за тобой и рассказывать про Актау.</div>
        
        <button id="btnConnect">🔌 ПОДКЛЮЧИТЬ РОБОТА</button>
        <button id="btnTalk">🎤 ЗАДАТЬ ВОПРОС</button>
    </div>

    <script>
        // --- НАСТРОЙКИ ---
        const GEMINI_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4";
        const LEGO_SERVICE_UUID = '00001623-1212-efde-1523-785feabcd123';
        const LEGO_CHARACTERISTIC_UUID = '00001623-1212-efde-1523-785feabcd123';

        let model, hubChar, recognition;
        let isMoving = false;
        let lastMotorUpdate = 0;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const log = document.getElementById('sysLog');
        const aiBox = document.getElementById('aiReply');

        // --- 1. BLUETOOTH (ИДЕАЛЬНОЕ ПОДКЛЮЧЕНИЕ) ---
        document.getElementById('btnConnect').onclick = async () => {
            try {
                log.innerText = "СИСТЕМА: ПОИСК LEGO HUB...";
                // Фильтруем устройства, чтобы видеть только LEGO
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'LEGO' }, { namePrefix: 'Hub' }],
                    optionalServices: [LEGO_SERVICE_UUID]
                });

                log.innerText = "СИСТЕМА: СОЕДИНЕНИЕ...";
                const server = await device.gatt.connect();
                
                // Проверка на наличие сервиса перед использованием
                const service = await server.getPrimaryService(LEGO_SERVICE_UUID).catch(() => null);
                
                if (!service) {
                    throw new Error("Это устройство не поддерживает протокол LEGO LWP3.");
                }

                hubChar = await service.getCharacteristic(LEGO_CHARACTERISTIC_UUID);
                
                log.innerText = "СИСТЕМА: РОБОТ ГОТОВ";
                document.getElementById('btnConnect').style.display = 'none';
                document.getElementById('btnTalk').style.display = 'block';
                aiBox.innerText = "Связь установлена! Я готов двигаться.";
                
            } catch (e) {
                log.innerText = "ОШИБКА: " + e.message;
                console.error(e);
            }
        };

        async function drive(leftSpeed, rightSpeed) {
            const now = Date.now();
            if (!hubChar || now - lastMotorUpdate < 100) return;
            lastMotorUpdate = now;

            // Формирование команды для LEGO Hub (Port Output Command)
            // Порт A (00), Порт B (01). WriteDirect (0x51)
            const cmd = (port, spd) => new Uint8Array([0x08, 0x00, 0x81, port, 0x11, 0x51, 0x00, spd & 0xFF]);
            
            try {
                await hubChar.writeValueWithoutResponse(cmd(0x00, leftSpeed));
                await hubChar.writeValueWithoutResponse(cmd(0x01, -rightSpeed)); // Инверсия для разворота
            } catch (e) { console.warn("Motor signal lost"); }
        }

        // --- 2. ЗРЕНИЕ (ПЛАВНОЕ СЛЕЖЕНИЕ) ---
        async function initAI() {
            log.innerText = "СИСТЕМА: ЗАГРУЗКА ЗРЕНИЯ...";
            model = await blazeface.load();
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                log.innerText = "СИСТЕМА: ОЖИДАНИЕ РОБОТА";
                runTracking();
            };
        }

        async function runTracking() {
            const ctx = canvas.getContext('2d');
            const predictions = await model.estimateFaces(video, false);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (predictions.length > 0) {
                const face = predictions[0];
                const xCenter = face.topLeft[0] + (face.bottomRight[0] - face.topLeft[0]) / 2;
                const screenCenter = video.videoWidth / 2;
                
                // Рисуем рамку
                ctx.strokeStyle = "#00ffcc";
                ctx.lineWidth = 3;
                ctx.strokeRect(face.topLeft[0], face.topLeft[1], face.bottomRight[0]-face.topLeft[0], face.bottomRight[1]-face.topLeft[1]);

                // Логика движения
                const offset = xCenter - screenCenter;
                if (Math.abs(offset) > 40) {
                    // Плавная скорость: чем дальше от центра, тем быстрее (но не более 30)
                    const speed = Math.min(Math.abs(offset) / 5, 30) * (offset > 0 ? -1 : 1);
                    drive(speed, -speed);
                } else {
                    drive(0, 0);
                }
            } else {
                drive(0, 0);
            }
            requestAnimationFrame(runTracking);
        }

        // --- 3. ГОЛОС И GEMINI ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            recognition = new SpeechRec();
            recognition.lang = 'ru-RU';
            
            recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                aiBox.innerText = "Вы: " + text;
                log.innerText = "СИСТЕМА: ЗАПРОС К ИИ...";
                
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            contents: [{parts: [{text: `Ты - робот-гид по Актау. Отвечай кратко (до 20 слов). Рассказывай интересно. Вопрос: ${text}`}]}]
                        })
                    });
                    const data = await res.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    aiBox.innerText = reply;
                    
                    const speech = new SpeechSynthesisUtterance(reply);
                    speech.lang = 'ru-RU';
                    window.speechSynthesis.speak(speech);
                } catch (err) { aiBox.innerText = "Ошибка ИИ. Проверь интернет."; }
                
                log.innerText = "СИСТЕМА: РОБОТ ГОТОВ";
            };
        }

        document.getElementById('btnTalk').onclick = () => {
            recognition.start();
            log.innerText = "СИСТЕМА: СЛУШАЮ...";
        };

        initAI();
    </script>
</body>
</html>
