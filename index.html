<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Robot Guide Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0a0a0a; color: #fff; margin: 0; }
        #video-container { position: relative; width: 100%; max-width: 500px; margin: 10px auto; border-radius: 20px; overflow: hidden; border: 4px solid #333; }
        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { padding: 15px 40px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; transition: 0.3s; }
        #connectBtn { background: #00ff88; color: #000; font-weight: bold; }
        #talkBtn { background: #0088ff; color: #fff; display: none; }
        #status { font-family: monospace; color: #00ff88; margin-top: 10px; min-height: 20px; }
        .ai-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; width: 80%; max-width: 400px; font-style: italic; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div id="status">Загрузка ИИ...</div>
        <div id="ai-response" class="ai-box">Нажмите "Слушать", чтобы начать диалог</div>
        <button id="connectBtn">ПОДКЛЮЧИТЬ LEGO HUB</button>
        <button id="talkBtn">🎤 СЛУШАТЬ</button>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyCZ5eF8S8KQyqvdVCH0TSnuHVX1a4vw8J4";
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const aiBox = document.getElementById('ai-response');
        const connectBtn = document.getElementById('connectBtn');
        const talkBtn = document.getElementById('talkBtn');

        let model, hubChar, recognition;
        let isTracking = true;
        let lastCommandTime = 0;

        // --- 1. СВЯЗЬ С LEGO (Bluetooth) ---
        connectBtn.onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'со' }],
                    optionalServices: ['00001623-1212-efde-1523-785feabcd123']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('00001623-1212-efde-1523-785feabcd123');
                hubChar = await service.getCharacteristic('00001623-1212-efde-1523-785feabcd123');
                status.innerText = "LEGO подключен!";
                connectBtn.style.display = "none";
                talkBtn.style.display = "block";
            } catch (e) { status.innerText = "Ошибка Bluetooth: " + e.message; }
        };

        async function sendLegoMove(left, right) {
            const now = Date.now();
            if (!hubChar || now - lastCommandTime < 100) return; // Ограничение: 10 команд в сек
            lastCommandTime = now;

            // Команда моторам (Port Output Command)
            // Порт 0 (A) и Порт 1 (B)
            const cmdA = [0x08, 0x00, 0x81, 0x00, 0x11, 0x51, 0x01, left & 0xff];
            const cmdB = [0x08, 0x00, 0x81, 0x01, 0x11, 0x51, 0x01, (-right) & 0xff]; // Инверсия для симметрии
            
            const fullCmd = new Uint8Array([...cmdA, ...cmdB]);
            await hubChar.writeValueWithoutResponse(fullCmd);
        }

        // --- 2. ГОЛОС И GEMINI ---
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'ru-RU';
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                aiBox.innerText = "Вы: " + text;
                processWithAI(text);
            };
        }

        talkBtn.onclick = () => {
            recognition.start();
            status.innerText = "Слушаю...";
        };

        async function processWithAI(text) {
            if (text.toLowerCase().includes("до свидания") || text.toLowerCase().includes("спасибо")) {
                isTracking = false;
                speak("Пожалуйста! Был рад помочь. До встречи!");
                return;
            }

            status.innerText = "Запрос к Gemini...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Ты - робот-гид в Актау. Отвечай кратко (15 слов макс). Вопрос: ${text}` }] }]
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                aiBox.innerText = reply;
                speak(reply);
            } catch (e) { 
                aiBox.innerText = "Ошибка ИИ: " + e.message; 
                console.error(e);
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        // --- 3. ЗРЕНИЕ И СЛЕЖЕНИЕ ---
        async function setup() {
            model = await blazeface.load();
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                status.innerText = "ИИ готов. Подключите робота.";
                detect();
            };
        }

        async function detect() {
            if (!isTracking) return;
            const preds = await model.estimateFaces(video, false);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0, canvas.width, canvas.height);

            if (preds.length > 0) {
                const face = preds[0];
                const x = face.topLeft[0] + (face.bottomRight[0] - face.topLeft[0])/2;
                const center = canvas.width / 2;

                ctx.strokeStyle = "#00ff88";
                ctx.lineWidth = 4;
                ctx.strokeRect(face.topLeft[0], face.topLeft[1], face.bottomRight[0]-face.topLeft[0], face.bottomRight[1]-face.topLeft[1]);

                // Порог чувствительности: 60 пикселей от центра
                if (x < center - 60) sendLegoMove(20, -20);
                else if (x > center + 60) sendLegoMove(-20, 20);
                else sendLegoMove(0, 0);
            } else {
                sendLegoMove(0, 0);
            }
            requestAnimationFrame(detect);
        }

        setup();
    </script>
</body>
</html>
